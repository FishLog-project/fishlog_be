name: CD

on:
  push:
    branches: [main]          # main에 머지될 때만 배포!

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'                          # be_config 서브모듈(src/main/resources)까지 clone
          token: '${{ secrets.GIT_ACTION_TOKEN }}'    # private 서브모듈 접근용 토큰 인증
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Build & Test
        run: ./gradlew build -x test

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 이미지 빌드 & push (이중 태그)
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/fishlog-app
          docker build -f docker/Dockerfile -t $IMAGE:latest -t $IMAGE:${{ github.sha }} .
          docker push $IMAGE --all-tags

      - name: docker-compose.yml 파일만 서버로 전송 (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker/docker-compose.yml"  # 로컬 프로젝트 내 파일 위치
          target: "~/app"                      # 서버에 복사될 대상 디렉토리
          strip_components: 1

      - name: EC2 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            docker compose pull api
            docker compose up -d api
            docker image prune -f