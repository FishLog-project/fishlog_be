name: CI

on:
  pull_request:
    branches: [main, dev]        # main으로 PR이 열려도

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4          # 코드 가져오기

      - uses: actions/setup-java@v4        # JDK 21 설치
        with:
          distribution: temurin
          java-version: 21

      - name: Build & Test
        run: ./gradlew build               # 빌드 (= 테스트 포함!)