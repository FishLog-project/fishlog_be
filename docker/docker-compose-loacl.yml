# 로컬 개발용 인프라 (앱은 IDE/호스트에서 실행, 이 compose는 의존 인프라만 띄움)
# 실행:  docker compose -f docker/docker-compose-loacl.yml up -d
# name: 프로젝트명을 고정해 다른 프로젝트(같은 docker/ 경로)와의 충돌을 방지한다.
name: fishlog
services:
  redis:
    image: redis:7-alpine
    container_name: fishlog-redis
    # application-local.properties 의 spring.data.redis.password=password 와 일치
    command: [ "redis-server", "--requirepass", "fishlog1234" ]
    ports:
      - "6380:6379" # 다른 컨테이너 redis(6379)와 충돌 회피 → 호스트 6380
    volumes:
      - fishlog-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10
    restart: unless-stopped

volumes:
  fishlog-redis-data:
