services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: fishlog
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10

  api:
    image: choiseogu/fishlog-app:latest    # 본인 이미지! 최신 태그로
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/fishlog
      SPRING_DATASOURCE_USERNAME: fishlog
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SERVER_FORWARD_HEADERS_STRATEGY: framework
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql-data: