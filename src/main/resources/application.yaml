spring:
  application:
    name: fishlog_be
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fishlog}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    jpa:
      hibernate:
        ddl-auto: update    # 엔티티 보고 테이블 자동 생성/수정 (개발용)
      show-sql: true

